version: "3.8"

services:
  rippermcp:
    build: .
    container_name: rippermcp-server
    restart: unless-stopped
    ports:
      - "8103:8103"
    volumes:
      # Persistent storage for SQLite database and tokens
      - ./data:/app/data
    env_file:
      - .env

networks:
  default:
    name: rippermcp-network
